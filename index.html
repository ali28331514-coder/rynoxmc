<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box PvP - Rynox</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Orbitron','Courier New',monospace;background:radial-gradient(circle at 20% 80%,#0d47a1 0%,#1a237e 50%,#0d1b2a 100%);min-height:100vh;overflow:hidden;position:relative;color:#fff}
        .stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:-1;background:radial-gradient(2px 2px at 20px 30px, #4488ff, transparent),radial-gradient(2px 2px at 40px 70px, #66aaff, transparent);background-repeat:repeat;background-size:100px 100px;animation:twinkle 15s linear infinite}
        .container{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(145deg,rgba(13,71,161,.95),rgba(26,35,126,.98));backdrop-filter:blur(25px);border-radius:30px;padding:50px;box-shadow:0 30px 80px rgba(68,136,255,.4);width:90%;max-width:800px;height:92vh;text-align:center;border:2px solid rgba(68,136,255,.6);overflow-y:auto;overflow-x:hidden}
        
        .minecraft-text{font-size:clamp(3em,9vw,5.5em);font-weight:900;background:linear-gradient(45deg,#4488ff,#66aaff,#4488ff,#1e40af);background-size:400% 400%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:rainbowShift 1.5s linear infinite;margin-bottom:30px;letter-spacing:5px;text-shadow:0 0 40px rgba(68,136,255,1)}
        
        .ip-section{position:relative;margin:30px 0;padding:35px 25px;background:rgba(68,136,255,.5);border-radius:30px;border:5px solid rgba(68,136,255,1);box-shadow:0 30px 70px rgba(68,136,255,.7);min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center}
        .server-ip{display:inline-block;font-size:clamp(2em,7vw,3.2em);font-weight:900;background:linear-gradient(135deg,#66aaff,#4488ff,#1e40af);padding:25px 50px;margin:10px 0;border-radius:25px;cursor:pointer;transition:all .4s ease;border:5px solid rgba(255,255,255,.9);box-shadow:0 20px 50px rgba(68,136,255,.8);text-shadow:0 0 25px rgba(255,255,255,1);white-space:nowrap;min-width:280px;position:relative;z-index:2}
        .server-ip::before{content:'';position:absolute;top:-10px;left:50%;transform:translateX(-50%);width:60px;height:60px;background:radial-gradient(circle,#fff,transparent);border-radius:50%;opacity:0.3;z-index:-1}
        .server-ip:hover{transform:scale(1.08) translateY(-5px);box-shadow:0 35px 80px rgba(68,136,255,1);border-color:#fff}
        
        .copy-btn{background:linear-gradient(135deg,#4488ff,#1e40af);color:#fff;border:none;padding:22px 55px;font-size:1.5em;border-radius:30px;cursor:pointer;margin:15px auto;display:block;transition:all .4s ease;box-shadow:0 20px 50px rgba(68,136,255,.7);font-weight:900;text-transform:uppercase;letter-spacing:2px;position:relative;overflow:hidden}
        .copy-btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);transition:left .6s}
        .copy-btn:hover{transform:translateY(-8px);box-shadow:0 30px 70px rgba(68,136,255,.9)}
        .copy-btn:hover::before{left:100%}
        
        .status-bar{display:flex;align-items:center;justify-content:center;gap:15px;margin:30px 0;padding:25px 50px;background:rgba(68,136,255,.6);border-radius:28px;border:4px solid #4488ff;box-shadow:0 0 35px rgba(68,136,255,.7)}
        .status{width:24px;height:24px;border-radius:50%;background:#00ff88;box-shadow:0 0 30px #00ff88;animation:pulse 1s infinite}
        .status-text{font-size:clamp(1.4em, 4vw, 2.2em) !important;font-weight:900;text-shadow:0 0 20px rgba(255,255,255,.8);letter-spacing:2px}
        
        /* القايمة - Box PvP بس */
        .qaim{position:relative;margin:35px auto;padding:40px 30px;background:linear-gradient(145deg,rgba(68,136,255,.45),rgba(30,64,175,.65));border-radius:32px;border:4px solid rgba(68,136,255,1);backdrop-filter:blur(25px);max-width:420px;box-shadow:0 35px 80px rgba(68,136,255,.6)}
        .qaim-title{font-size:2.3em;margin-bottom:30px;background:linear-gradient(45deg,#fff,#66aaff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:900;text-align:center;text-transform:uppercase;letter-spacing:4px;text-shadow:0 0 25px rgba(255,255,255,.6)}
        .qaim-list{display:flex;flex-direction:column;gap:25px;padding:0;text-align:center}
        .qaim-item{padding:28px 35px;background:linear-gradient(135deg,rgba(255,255,255,.35),rgba(255,255,255,.15));border-radius:25px;transition:all .4s ease;border:3px solid rgba(255,255,255,.5);font-size:1.8em;font-weight:900;text-transform:uppercase;position:relative;overflow:hidden;box-shadow:0 15px 40px rgba(0,0,0,.4)}
        .qaim-item::before{content:'⚔️';position:absolute;top:20px;right:25px;font-size:2em;opacity:.95}
        .qaim-item::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);transition:left .5s}
        .qaim-item:hover{background:linear-gradient(135deg,#66aaff,#4488ff);border-color:#fff;transform:translateY(-12px) scale(1.05);box-shadow:0 35px 80px rgba(68,136,255,.9)}
        .qaim-item:hover::after{left:100%}
        
        .platforms{display:flex;gap:30px;justify-content:center;flex-wrap:wrap;margin:40px 0;padding:20px 0}
        .platform{width:120px;height:120px;border-radius:30px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:3.5em;text-decoration:none;transition:all .4s ease;box-shadow:0 20px 60px rgba(0,0,0,.7);border:5px solid rgba(255,255,255,.5)}
        .platform:hover{transform:translateY(-20px) scale(1.25);box-shadow:0 45px 100px rgba(114,137,218,.9)}
        .platform.discord{background:linear-gradient(135deg,#7289da,#5865f2),linear-gradient(135deg,#99aab5,#6574b3);background-blend-mode:overlay}
        
        @keyframes rainbowShift{0%{background-position:0% 50%}100%{background-position:400% 50%}}
        @keyframes twinkle{0%,100%{opacity:.3}50%{opacity:1}}
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(1.4)}}
        
        @media (max-width:768px){
            .container{padding:40px 25px;height:96vh;width:95%;border-radius:25px}
            .minecraft-text{letter-spacing:3px}
            .ip-section{padding:30px 20px;min-height:110px}
            .server-ip{padding:22px 40px;min-width:250px}
            .status-bar{padding:22px 40px}
            .qaim{max-width:95%;padding:35px 25px}
            .platform{width:100px;height:100px;font-size:3em}
        }
        
        @media (max-width:480px){
            .container{padding:30px 20px;border-radius:20px}
            .server-ip{padding:20px 35px;font-size:2em}
            .status-bar{padding:20px 30px}
            .platform{width:90px;height:90px;font-size:2.5em}
        }
        
        /* Scrollbar مخصص */
        .container::-webkit-scrollbar{width:12px}
        .container::-webkit-scrollbar-track{background:rgba(255,255,255,.1);border-radius:12px}
        .container::-webkit-scrollbar-thumb{background:linear-gradient(#4488ff,#66aaff);border-radius:12px}
        .container::-webkit-scrollbar-thumb:hover{background:linear-gradient(#66aaff,#4488ff)}
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="container">
        <div class="minecraft-text">Box PvP</div>
        
        <div class="ip-section">
            <div class="server-ip" onclick="copyIP()">rynox.mcsh.io</div>
            <button class="copy-btn" onclick="copyIP()">⚔️ Join Server</button>
        </div>
        
        <div class="status-bar">
            <div class="status"></div>
            <span class="status-text">🟢 Server Online</span>
        </div>
        
        <!-- القايمة - Box PvP بس -->
        <div class="qaim">
            <div class="qaim-title">Box PvP</div>
            <div class="qaim-list">
                <div class="qaim-item">Box PvP</div>
            </div>
        </div>
        
        <div class="platforms">
            <a href="https://discord.gg/uQ49BG4z" class="platform discord" title="Discord"><i class="fab fa-discord"></i></a>
        </div>
    </div>
    
    <script>
        const IP = "rynox.mcsh.io";
        function copyIP(){
            navigator.clipboard.writeText(IP).then(()=>{
                const btn = document.querySelector(".copy-btn");
                const ipEl = document.querySelector(".server-ip");
                const oldText = btn.innerHTML;
                btn.innerHTML = "✅ Copied!";
                btn.style.background = "linear-gradient(135deg, #00ff88, #00cc66)";
                ipEl.style.background = "linear-gradient(135deg, #00ff88, #00cc66)";
                setTimeout(()=>{
                    btn.innerHTML = oldText;
                    btn.style.background = "";
                    ipEl.style.background = "";
                }, 2000);
            }).catch(()=>alert("Copy: "+IP));
        }
    </script>
</body>
</html>
