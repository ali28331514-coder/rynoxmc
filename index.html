<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RynoxMC - IP السيرفر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }
        .container {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 {
            font-size: 2.8em;
            margin-bottom: 15px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }
        .server-ip {
            font-size: 2.2em;
            font-weight: bold;
            background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            padding: 20px;
            margin: 25px 0;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid rgba(255,255,255,0.4);
            display: inline-block;
        }
        .server-ip:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(255,255,255,0.2);
        }
        .copy-btn {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.1em;
            border-radius: 30px;
            cursor: pointer;
            margin: 20px 0;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(76,175,80,0.4);
            font-weight: bold;
        }
        .copy-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(76,175,80,0.6);
        }
        .platforms {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 25px;
        }
        .platform {
            width: 65px;
            height: 65px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.6em;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }
        .platform::before {
            content: attr(data-name);
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7em;
            white-space: nowrap;
            opacity: 0;
            transition: all 0.3s ease;
        }
        .platform:hover {
            transform: translateY(-8px) scale(1.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        .platform:hover::before {
            bottom: -25px;
            opacity: 1;
        }
        .platform.discord { background: linear-gradient(135deg, #5865F2 0%, #4752C4 100%); }
        .platform.server { background: linear-gradient(135deg, #28a745 0%, #20c997 100%); }
        .platform.tiktok { background: linear-gradient(135deg, #000 0%, #FF0050 100%); }
        .platform.youtube { background: linear-gradient(135deg, #FF0000 0%, #CC0000 100%); }
        @media (max-width: 600px) {
            h1 { font-size: 2.2em; }
            .server-ip { font-size: 1.8em; }
            .platform { width: 55px; height: 55px; font-size: 1.4em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 RynoxMC</h1>
        
        <div class="server-ip" onclick="copyIP()" data-name="Server IP">
            rynox.mcsh.io
        </div>
        
        <button class="copy-btn" onclick="copyIP()">
            📋 نسخ IP السيرفر
        </button>
        
        <div class="platforms">
            <a href="https://rynox.mcsh.io" class="platform server" title="Server IP" data-name="السيرفر">
                <i class="fas fa-server"></i>
            </a>
            <a href="https://discord.gg/t8YaQxZZ" class="platform discord" title="Discord" data-name="ديسكورد">
                <i class="fab fa-discord"></i>
            </a>
            <a href="https://www.tiktok.com/@rynoxmc1" class="platform tiktok" title="TikTok" data-name="تيك توك">
                <i class="fab fa-tiktok"></i>
            </a>
            <a href="https://www.youtube.com/channel/UCtgiXI46ZIcZ1oIxe-uzlKQ" class="platform youtube" title="YouTube" data-name="يوتيوب">
                <i class="fab fa-youtube"></i>
            </a>
        </div>
    </div>

    <script>
        function copyIP() {
            const ip = 'rynox.mcsh.io';
            navigator.clipboard.writeText(ip).then(() => {
                const btn = document.querySelector('.copy-btn');
                const original = btn.innerHTML;
                btn.innerHTML = '✅ تم نسخ IP السيرفر!';
                btn.style.background = 'linear-gradient(135deg, #00ff88 0%, #00cc6a 100%)';
                
                setTimeout(() => {
                    btn.innerHTML = original;
                    btn.style.background = 'linear-gradient(135deg, #4CAF50 0%, #45a049 100%)';
                }, 2500);
            }).catch(() => {
                alert('انسخ: ' + ip);
            });
        }
    </script>
</body>
</html>
