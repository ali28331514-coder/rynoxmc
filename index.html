<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 RynoxMC - IP & Discord</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🎮 RynoxMC</h1>
            
            <div class="info-box">
                <h2>معلوماتك</h2>
                <div class="info-item">
                    <span class="label">🌐 الـ IP:</span>
                    <span class="value" id="ip">جاري التحميل...</span>
                </div>
            </div>
            
            <div class="discord-box">
                <p>انضم إلى سيرفر Discord الخاص بنا:</p>
                <a href="https://discord.gg/t8YaQxZZ" target="_blank" class="discord-btn">
                    💬 Discord Server
                </a>
            </div>
            
            <!-- المنصات في الأسفل -->
            <div class="social-platforms">
                <a href="https://rynox.mcsh.io" class="platform-btn server-ip" title="Server IP">
                    <i class="fas fa-server"></i>
                </a>
                <a href="https://discord.gg/t8YaQxZZ" class="platform-btn discord" title="Discord">
                    <i class="fab fa-discord"></i>
                </a>
                <a href="https://www.tiktok.com/@rynoxmc1" class="platform-btn tiktok" title="TikTok">
                    <i class="fab fa-tiktok"></i>
                </a>
                <a href="https://www.youtube.com/channel/UCtgiXI46ZIcZ1oIxe-uzlKQ" class="platform-btn youtube" title="YouTube">
                    <i class="fab fa-youtube"></i>
                </a>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
